# Peer groups for Mirae Asset Life Insurance benchmarking
# 사용자 변경 (2026-05-13): 신한라이프·흥국생명·교보생명·KB라이프·메리츠화재 추가,
# 코리안리·롯데손해보험 제외. 메트라이프·라이나는 DART 미제출이라 포함 불가.
# 동양생명은 유지.
#
# IFRS17 풍부 데이터 보유 회사 9개사: BEL/RA/CSM 분해·회계모형·P&L 가능
# 신규 4개사 (교보·신한·흥국·메리츠): BS top-line(보험계약부채)만 가능
# KB라이프: BS에도 보험계약부채 element 없음 — 부채총계/자산만 사용

self_cik: "00112332"

groups:
  all_insurers:
    label: 한국 보험사 비교군 전체
    description: 자사 + 동업사 13개사 (생보 8 · 손보 6) — BS 비교 기본 그룹
    members:
      - "00112332"  # 미래에셋생명 (self)
      - "00126256"  # 삼성생명
      - "00113058"  # 한화생명
      - "00117267"  # 동양생명
      - "00112882"  # 교보생명 (Unlisted, BS only)
      - "00137517"  # 신한라이프 (Unlisted, BS only)
      - "00167068"  # 흥국생명 (Unlisted, BS only)
      - "00160393"  # KB라이프 (Unlisted, no BS insurance liability)
      - "00139214"  # 삼성화재
      - "00164973"  # 현대해상
      - "00159102"  # DB손해보험
      - "00135917"  # 한화손해보험
      - "00103176"  # 흥국화재
      - "00117744"  # 메리츠화재 (Unlisted, BS only)

  life:
    label: 생명보험 (자사 + 동업사 7)
    description: 핵심 비교군 — 자사 + 생보 7개사
    members:
      - "00112332"  # 미래에셋생명 (self)
      - "00126256"  # 삼성생명
      - "00113058"  # 한화생명
      - "00117267"  # 동양생명
      - "00112882"  # 교보생명
      - "00137517"  # 신한라이프
      - "00167068"  # 흥국생명
      - "00160393"  # KB라이프

  non_life:
    label: 손해보험 (6개)
    description: 사업모델 다름 — 별도 섹션
    members:
      - "00139214"  # 삼성화재
      - "00164973"  # 현대해상
      - "00159102"  # DB손해보험
      - "00135917"  # 한화손해보험
      - "00103176"  # 흥국화재
      - "00117744"  # 메리츠화재

  # IFRS17 분해 분석 가능한 회사만 (BEL/RA/CSM, PAA/Non-PAA, P&L)
  ifrs17_detailed:
    label: IFRS17 상세 주석 제출 (BEL/RA/CSM·회계모형·P&L 분해 가능)
    description: KOSPI 상장 + 보험업 주력 9개사
    members:
      - "00112332"  # 미래에셋생명
      - "00126256"  # 삼성생명
      - "00113058"  # 한화생명
      - "00117267"  # 동양생명
      - "00139214"  # 삼성화재
      - "00164973"  # 현대해상
      - "00159102"  # DB손해보험
      - "00135917"  # 한화손해보험
      - "00103176"  # 흥국화재

  # 생보 중 IFRS17 분해 분석 가능 (자사+3개)
  life_ifrs17_detailed:
    label: 생보 IFRS17 풍부 4개사 (자사 직접 비교)
    description: 부채 분해·회계모형·P&L 분해 가능
    members:
      - "00112332"  # 미래에셋생명
      - "00126256"  # 삼성생명
      - "00113058"  # 한화생명
      - "00117267"  # 동양생명

# 분석 정책:
# - BS top-line 비교 (보험계약부채, 자산총계, 부채총계, 자본총계): groups.all_insurers
# - 직접 비교 (자사 vs 생보 7): groups.life
# - 부채 분해 / 회계모형 / 손익: groups.ifrs17_detailed 또는 life_ifrs17_detailed
# - 손보는 별도 섹션 (사업모델 차이)
