# IFRS17 보험계약부채·손익 분석 사전
# 2025 4Q DART XBRL 실측 기반 (11개 KOSPI 상장 보험사)
# 표준 element 우선, entity 확장은 별도 섹션

# ─── 부채 (instant period) ──────────────────────────────────────────────

liability_balance:
  # 보험계약부채(자산) 총량 element. axis filter 없이 사용 시 모든 분류 합.
  total_liability:
    element_id: ifrs-full_InsuranceContractsThatAreLiabilities
    ko_label: 부채인 보험계약
    coverage: 11/11
    period_type: instant
    note: 부채로 표시되는 분 (negative = net asset position 회사)

  total_asset:
    element_id: ifrs-full_InsuranceContractsThatAreAssets
    ko_label: 자산인 보험계약
    coverage: 11/11
    period_type: instant
    note: 자산으로 표시되는 분 (전체에서 차감)

# ─── 부채 구성요소 분해 axis (BEL / RA / CSM) ────────────────────────────

components_axis:
  axis_id: ifrs-full_InsuranceContractsByComponentsAxis
  ko_label: 구성요소별 보험계약
  coverage: 11/11
  members:
    BEL:
      element_id: ifrs-full_EstimatesOfPresentValueOfFutureCashFlowsMember
      ko_label: 미래 현금흐름의 현재가치 추정치
      desc: Best Estimate Liability (최선추정부채)
    RA:
      element_id: ifrs-full_RiskAdjustmentForNonfinancialRiskMember
      ko_label: 비금융위험에 대한 위험조정
      desc: Risk Adjustment for non-financial risk
    CSM:
      element_id: ifrs-full_ContractualServiceMarginMember
      ko_label: 보험계약마진
      desc: Contractual Service Margin

# ─── LRC vs LIC axis ────────────────────────────────────────────────────

lrc_lic_axis:
  axis_id: ifrs-full_InsuranceContractsByRemainingCoverageAndIncurredClaimsAxis
  ko_label: 잔여보장요소·발생사고요소별 보험계약
  coverage: 11/11
  members:
    LRC_excl_LossComponent:
      element_id: ifrs-full_NetLiabilitiesOrAssetsForRemainingCoverageExcludingLossComponentMember
      ko_label: 손실 요소를 제외한 잔여보장 요소에 대한 순부채(또는 순자산)
      desc: LRC excluding Loss Component
    LossComponent:
      element_id: ifrs-full_LossComponentMember
      ko_label: 손실 요소
      desc: Loss Component (LRC 중 손실예측분, onerous contracts)
    LIC:
      element_id: ifrs-full_LiabilitiesForIncurredClaimsMember
      ko_label: 발생사고부채
      desc: Liabilities for Incurred Claims
      coverage: 8/11  # 일부 회사는 dart_LiabilitiesForRemainingCoverageMember 사용
    LRC_alt:
      element_id: dart_LiabilitiesForRemainingCoverageMember
      ko_label: 잔여보장부채
      desc: Alternative LRC member (some companies)
      coverage: 9/11

# ─── 계약 유형 axis (발행보험 vs 보유재보험) ──────────────────────────────

contract_type_axis:
  axis_id: ifrs-full_TypesOfContractsAxis
  ko_label: 계약의 유형
  coverage: 11/11
  members:
    Issued:
      element_id: ifrs-full_InsuranceContractsIssuedMember
      ko_label: 발행한 보험계약
      desc: 회사가 발행한 보험계약 (주력)
    ReinsuranceHeld:
      element_id: ifrs-full_ReinsuranceContractsHeldMember
      ko_label: 보유 재보험계약
      desc: 회사가 보유한 재보험계약 (자산 측)

# ─── 회계모형 axis (PAA / Non-PAA = GMM+VFA) ────────────────────────────

measurement_model_axis:
  axis_id: ifrs-full_DisaggregationOfInsuranceContractsAxis
  ko_label: 보험계약의 세분
  coverage: 11/11
  note: |
    IFRS17 spec은 PAA vs Non-PAA만 표준 axis member로 정의.
    GMM(일반모형) vs VFA(변동수수료접근법)은 entity 확장 member에서 별도 매핑 필요.
  members:
    PAA:
      element_id: ifrs-full_InsuranceContractsToWhichPremiumAllocationApproachHasBeenAppliedMember
      ko_label: 보험료배분접근법을 적용한 보험계약
      desc: Premium Allocation Approach (단기·손보)
      coverage: 9/11
    NonPAA:
      element_id: ifrs-full_InsuranceContractsOtherThanThoseToWhichPremiumAllocationApproachHasBeenAppliedMember
      ko_label: 보험료배분접근법을 적용한 보험계약 외의 보험계약
      desc: GMM + VFA (장기·생보)
      coverage: 10/11

# GMM/VFA entity-extension member 패턴 (라벨 키워드 매칭)
measurement_model_extension_patterns:
  GMM:
    label_keywords: ["일반모형", "General Model", "GMM"]
    element_pattern: 'entity\d+_.*GeneralModel.*Member'
  VFA:
    label_keywords: ["변동수수료접근법", "Variable Fee", "VFA", "직접참여"]
    element_pattern: 'entity\d+_.*VariableFeeApproach.*Member'

# ─── 손익 (duration period) ─────────────────────────────────────────────

pl_items:
  insurance_revenue:
    element_id: ifrs-full_InsuranceRevenue
    ko_label: 보험수익
    coverage: 10/11
    period_type: duration
    sign: positive  # revenue

  insurance_service_result:
    element_id: ifrs-full_InsuranceServiceResult
    ko_label: 보험서비스결과
    coverage: 11/11
    period_type: duration
    sign: positive  # = Revenue - Service Expense

  insurance_finance_income_expense:
    element_id: ifrs-full_InsuranceFinanceIncomeExpenses
    ko_label: 보험금융수익(비용)
    coverage: 7/11
    period_type: duration

  insurance_service_expense:
    element_id: ifrs-full_InsuranceServiceExpensesFromInsuranceContractsIssued
    ko_label: 발행한 보험계약에서 생기는 보험서비스비용
    coverage: 9/11
    period_type: duration
    sign: negative

  # 보험수익 세분
  insurance_revenue_csm_release:
    element_id: ifrs-full_InsuranceRevenueContractualServiceMarginRecognisedInProfitOrLossForServicesProvided
    ko_label: 보험수익, 서비스의 이전으로 당기손익에 인식한 보험계약마진
    coverage: 10/11
    period_type: duration
    desc: CSM 상각액 → 보험수익 기여

  insurance_revenue_ra_release:
    element_id: ifrs-full_InsuranceRevenueChangeInRiskAdjustmentForNonfinancialRisk
    ko_label: 보험수익, 비금융위험에 대한 위험조정의 변동분
    coverage: 10/11
    period_type: duration
    desc: RA 해소 → 보험수익 기여

# ─── 변동분 분석용 (DI817100/200 변동 role) ──────────────────────────────

liability_movement:
  # CSM 변동 분석 핵심 element들 (DI817105 산하)
  initial_recognition:
    element_id: ifrs-full_IncreaseDecreaseThroughEffectsOfContractsInitiallyRecognisedInsuranceContractAssetLiability
    ko_label: 해당 기간에 처음 인식한 계약의 영향에 따른 증가분(감소분), 보험계약부채(자산)
    period_type: duration

  experience_adjustment:
    element_id: ifrs-full_IncreaseDecreaseThroughExperienceAdjustmentsInsuranceContractAssetLiability
    ko_label: 경험조정에 따른 증가분(감소분), 보험계약부채(자산)
    period_type: duration

  estimate_change_adjusting_csm:
    element_id: ifrs-full_IncreaseDecreaseThroughChangesInEstimatesThatAdjustContractualServiceMarginInsuranceContractAssetLiability
    ko_label: 보험계약마진을 조정하는 추정치의 변동분
    period_type: duration

  estimate_change_not_adjusting_csm:
    element_id: ifrs-full_IncreaseDecreaseThroughChangesInEstimatesThatDoNotAdjustContractualServiceMarginInsuranceContractAssetLiability
    ko_label: 보험계약마진을 조정하지 않는 추정치의 변동분
    period_type: duration

  past_service_change:
    element_id: ifrs-full_IncreaseDecreaseThroughChangesThatRelateToPastServiceInsuranceContractAssetLiability
    ko_label: 과거 서비스와 관련된 변동분
    period_type: duration

  premium_received:
    element_id: ifrs-full_IncreaseDecreaseThroughPremiumsReceivedForInsuranceContractAssetLiability
    ko_label: 발행한 보험계약에 대해 수취한 보험료
    period_type: duration

  claims_paid:
    element_id: ifrs-full_IncreaseDecreaseThroughIncurredClaimsPaidAndOtherInsuranceServiceExpensesPaidInsuranceContractAssetLiability
    ko_label: 보험금과 그 밖의 보험서비스비용
    period_type: duration

  acquisition_cashflows:
    element_id: ifrs-full_IncreaseDecreaseThroughInsuranceAcquisitionCashFlowsInsuranceContractAssetLiability
    ko_label: 보험취득 현금흐름에 따른 증가분(감소분)
    period_type: duration

